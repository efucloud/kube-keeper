id: k8s-troubleshoot
name: 故障定位
nameEn: Troubleshooting
mode: agent
scope: namespace
description: 面向 Kubernetes 多类资源对象的故障定位场景，适合金融制造业运维现场，基于状态、事件、日志、指标和配置证据收敛根因，并给出容量与扩缩容建议。
descriptionEn: Troubleshooting scenario for Kubernetes resources in finance and manufacturing operations, converging on root cause from state, events, logs, metrics, and configuration evidence, with capacity and scaling guidance.
